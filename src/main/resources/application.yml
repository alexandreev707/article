spring:
  flyway:
    clean-disabled: false
    validate-on-migrate: false
  application:
    name: marketplace-mvp
  
  datasource:
    url: jdbc:postgresql://localhost:5434/cryptodrop
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.cryptodrop: DEBUG
    org.springframework.security: DEBUG

oxapay:
  enabled: ${OXAPAY_ENABLED:true}
  # Production OxaPay (sandbox off unless OXAPAY_SANDBOX_ENABLED=true)
  sandbox-enabled: ${OXAPAY_SANDBOX_ENABLED:false}
  sandbox-merchant: ${OXAPAY_SANDBOX_MERCHANT:sandbox}
  base-url: ${OXAPAY_BASE_URL:https://api.oxapay.com}
  merchant-api-key: ${OXAPAY_MERCHANT_API_KEY:0TQI2K-U2LCTH-CHX6KK-VHZWVZ}
  payout-api-key: ${OXAPAY_PAYOUT_API_KEY:YEFJBD-KW4FQ2-I680BB-DTDRFM}
  callback-url: ${OXAPAY_CALLBACK_URL:https://article-aolc.onrender.com/api/checkout/oxapay/callback}
  return-url: ${OXAPAY_RETURN_URL:https://article-aolc.onrender.com/orders}
  invoice-lifetime-minutes: ${OXAPAY_INVOICE_LIFETIME_MINUTES:30}
  currency: ${OXAPAY_CURRENCY:USD}
  payout-currency: ${OXAPAY_PAYOUT_CURRENCY:USDT}
  payout-network: ${OXAPAY_PAYOUT_NETWORK:TRC20}
