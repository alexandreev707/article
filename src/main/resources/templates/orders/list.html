<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>My Orders - Marketplace</title>
</head>
<body>
<div th:fragment="content">
    <div class="container py-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
            <div class="flex items-center gap-3">
                <label for="statusFilter" class="text-sm text-gray-600">Status:</label>
                <select id="statusFilter" class="form-input w-40">
                    <option value="active" selected>Active</option>
                    <option value="all">All</option>
                    <option value="PENDING">Pending</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="PROCESSING">Processing</option>
                    <option value="SHIPPED">Shipped</option>
                    <option value="DELIVERED">Delivered</option>
                    <option value="CANCELLED">Cancelled</option>
                    <option value="REFUNDED">Refunded</option>
                </select>
            </div>
        </div>

        <div id="ordersContainer" class="table-container">
            <div class="text-center py-12">
                <div class="spinner"></div>
                <p class="text-gray-500 mt-4">Loading orders...</p>
            </div>
        </div>

        <div id="pagination" class="mt-8 flex justify-center items-center gap-4 hidden">
            <button type="button" id="prevPage" class="btn-secondary px-6 py-2">← Previous</button>
            <span id="pageInfo" class="text-gray-600 font-medium">Page 1 of 1</span>
            <button type="button" id="nextPage" class="btn-secondary px-6 py-2">Next →</button>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let currentStatus = 'active';
        const pageSize = 10;

        function paymentBadgeClass(ps) {
            if (!ps) return 'badge-warning';
            if (ps === 'PAID') return 'badge-success';
            if (ps === 'FAILED') return 'badge-danger';
            if (ps === 'REFUNDED') return 'badge-info';
            return 'badge-warning';
        }

        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            const pagination = document.getElementById('pagination');
            try {
                const response = await fetch('/api/orders?page=' + currentPage + '&size=' + pageSize + '&status=' + encodeURIComponent(currentStatus));
                const data = await response.json();
                const orders = data.orders?.content || data.orders || [];
                const totalPages = data.totalPages || 1;

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-center py-12 text-gray-500">You have no orders yet</p>';
                    if (pagination) pagination.classList.add('hidden');
                    return;
                }

                container.innerHTML = '<table><thead><tr><th>Product</th><th>Quantity</th><th>Total</th><th>Order status</th><th>Payment</th><th>Date</th><th></th></tr></thead><tbody>' +
                    orders.map(order => {
                        const pay = order.paymentStatus || 'PENDING';
                        const showDeliveryBtn = order.status === 'SHIPPED';
                        return `
                        <tr class="hover:bg-gray-50">
                            <td class="cursor-pointer" onclick="window.location.href='/products/${order.productId}'">
                                <div class="flex items-center gap-3">
                                    <div class="w-14 h-14 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                                        ${order.productImage ? '<img src="' + order.productImage + '" alt="" class="w-full h-full object-cover" onerror="this.style.display=\'none\'">' : '<div class="w-full h-full flex items-center justify-center text-gray-400 text-xs">No photo</div>'}
                                    </div>
                                    <span class="font-medium text-gray-900 line-clamp-2">${order.productTitle || ''}</span>
                                </div>
                            </td>
                            <td>${order.quantity}</td>
                            <td class="font-bold text-primary">$${Number(order.totalPrice).toFixed(2)}</td>
                            <td><span class="badge ${order.status === 'DELIVERED' ? 'badge-success' : order.status === 'CANCELLED' ? 'badge-danger' : order.status === 'SHIPPED' ? 'badge-info' : order.status === 'CONFIRMED' ? 'badge-primary' : 'badge-warning'}">${order.status}</span></td>
                            <td><span class="badge ${paymentBadgeClass(order.paymentStatus)}">${pay}</span></td>
                            <td class="text-gray-500 text-sm">${new Date(order.createdAt).toLocaleDateString()}</td>
                            <td class="whitespace-nowrap">${showDeliveryBtn ? '<button type="button" class="btn-primary text-sm px-3 py-1.5 confirm-delivery-btn" data-order-id="' + order.id + '">Order received</button>' : ''}</td>
                        </tr>
                    `;
                    }).join('') + '</tbody></table>';

                container.querySelectorAll('.confirm-delivery-btn').forEach(function (btn) {
                    btn.addEventListener('click', async function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var oid = btn.getAttribute('data-order-id');
                        if (!oid) return;
                        btn.disabled = true;
                        var lab = btn.textContent;
                        btn.textContent = '…';
                        try {
                            var res = await fetch('/api/orders/' + encodeURIComponent(oid) + '/confirm-delivery', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' }
                            });
                            if (!res.ok) throw new Error(await res.text());
                            loadOrders();
                        } catch (err) {
                            console.error(err);
                            alert('Could not confirm delivery. ' + (err.message || ''));
                            btn.disabled = false;
                            btn.textContent = lab;
                        }
                    });
                });

                document.getElementById('pageInfo').textContent = 'Page ' + (data.currentPage + 1) + ' of ' + totalPages;
                document.getElementById('prevPage').disabled = currentPage === 0;
                document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
                pagination.classList.remove('hidden');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="text-center py-12 text-red-500">Failed to load orders</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadOrders(); } });
            document.getElementById('nextPage').addEventListener('click', () => { currentPage++; loadOrders(); });
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentStatus = document.getElementById('statusFilter').value;
                currentPage = 0;
                loadOrders();
            });
        });
    </script>
</div>
</body>
</html>
