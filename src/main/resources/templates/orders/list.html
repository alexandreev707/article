<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>My Orders - Marketplace</title>
</head>
<body>
<div th:fragment="content">
    <div class="container py-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
            <div class="flex items-center gap-3">
                <label for="statusFilter" class="text-sm text-gray-600">Status:</label>
                <select id="statusFilter" class="form-input w-40">
                    <option value="active" selected>Active</option>
                    <option value="all">All</option>
                    <option value="PENDING">Pending</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="PROCESSING">Processing</option>
                    <option value="SHIPPED">Shipped</option>
                    <option value="DELIVERED">Delivered</option>
                    <option value="CANCELLED">Cancelled</option>
                    <option value="REFUNDED">Refunded</option>
                </select>
            </div>
        </div>

        <div id="ordersContainer" class="table-container">
            <div class="text-center py-12">
                <div class="spinner"></div>
                <p class="text-gray-500 mt-4">Loading orders...</p>
            </div>
        </div>

        <!-- ✅ PAGINATION ADDED -->
        <div id="pagination" class="mt-8 flex justify-center items-center gap-4 hidden">
            <button id="prevPage" class="btn-secondary px-6 py-2">← Previous</button>
            <span id="pageInfo" class="text-gray-600 font-medium">Page 1 of 1</span>
            <button id="nextPage" class="btn-secondary px-6 py-2">Next →</button>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let currentStatus = 'active';
        const pageSize = 10;

        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            const pagination = document.getElementById('pagination');

            try {
                const response = await fetch(`/api/orders?page=${currentPage}&size=${pageSize}&status=${encodeURIComponent(currentStatus)}`);
                const data = await response.json();

                console.log('📥 Data:', data);

                // ✅ FIX: Spring Page
                const orders = data.orders?.content || data.orders || [];
                const totalPages = data.totalPages || data.orders?.totalPages || 1;

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-center py-12 text-gray-500">You have no orders yet</p>';
                    if (pagination) pagination.classList.add('hidden');
                    return;
                }

                // ✅ TABLE
                container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr class="hover:bg-gray-50 cursor-pointer" onclick="window.location.href='/products/${order.productId}'">
                                <td>
                                    <div class="flex items-center gap-3">
                                        <div class="w-14 h-14 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                                            ${order.productImage
                                                ? `<img src="${order.productImage}" alt="" class="w-full h-full object-cover" onerror="this.style.display='none';">`
                                                : `<div class="w-full h-full flex items-center justify-center text-gray-400 text-xs">No photo</div>`}
                                        </div>
                                        <div class="flex flex-col">
                                            <span class="font-medium text-gray-900 line-clamp-2">${order.productTitle}</span>
                                        </div>
                                    </div>
                                </td>
                                <td>${order.quantity}</td>
                                <td class="font-bold text-primary">$${Number(order.totalPrice).toFixed(2)}</td>
                                <td>
                                    <span class="badge
                                        ${order.status === 'DELIVERED' ? 'badge-success' :
                    order.status === 'CANCELLED' ? 'badge-danger' :
                        order.status === 'SHIPPED' ? 'badge-info' :
                            order.status === 'CONFIRMED' ? 'badge-primary' : 'badge-warning'}">
                                        ${order.status}
                                    </span>
                                </td>
                                <td class="text-gray-500 text-sm">${new Date(order.createdAt).toLocaleDateString('en-US')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

                // ✅ PAGINATION (with checks)
                if (pagination && document.getElementById('pageInfo')) {
                    document.getElementById('pageInfo').textContent =
                        `Page ${data.currentPage + 1} of ${totalPages}`;

                    const prevBtn = document.getElementById('prevPage');
                    const nextBtn = document.getElementById('nextPage');

                    if (prevBtn) prevBtn.disabled = currentPage === 0;
                    if (nextBtn) nextBtn.disabled = currentPage >= totalPages - 1;

                    pagination.classList.remove('hidden');
                }

            } catch (error) {
                console.error('❌ Error:', error);
                container.innerHTML = '<p class="text-center py-12 text-red-500">Failed to load orders</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();

            // ✅ ELEMENT CHECKS
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const statusFilter = document.getElementById('statusFilter');

            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    if (currentPage > 0) {
                        currentPage--;
                        loadOrders();
                    }
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    currentPage++;
                    loadOrders();
                });
            }

            if (statusFilter) {
                statusFilter.addEventListener('change', () => {
                    currentStatus = statusFilter.value || 'active';
                    currentPage = 0;
                    loadOrders();
                });
            }
        });
    </script>
</div>
</body>
</html>
