<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>My Orders - Marketplace</title>
</head>
<body>
<div th:fragment="content">
    <div class="container py-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
            <div class="flex items-center gap-3">
                <label for="statusFilter" class="text-sm text-gray-600">Status:</label>
                <select id="statusFilter" class="form-input w-40">
                    <option value="active" selected>Active</option>
                    <option value="all">All</option>
                    <option value="PENDING">Pending</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="PROCESSING">Processing</option>
                    <option value="SHIPPED">Shipped</option>
                    <option value="DELIVERED">Delivered</option>
                    <option value="CANCELLED">Cancelled</option>
                    <option value="REFUNDED">Refunded</option>
                </select>
            </div>
        </div>

        <div id="ordersContainer" class="table-container">
            <div class="text-center py-12">
                <div class="spinner"></div>
                <p class="text-gray-500 mt-4">Loading orders...</p>
            </div>
        </div>

        <div id="pagination" class="mt-8 flex justify-center items-center gap-4 hidden">
            <button type="button" id="prevPage" class="btn-secondary px-6 py-2">← Previous</button>
            <span id="pageInfo" class="text-gray-600 font-medium">Page 1 of 1</span>
            <button type="button" id="nextPage" class="btn-secondary px-6 py-2">Next →</button>
        </div>

        <div id="refundModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4" aria-modal="true" role="dialog">
            <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 pointer-events-auto" role="document" onclick="event.stopPropagation()">
                <h2 class="text-lg font-bold text-gray-900 mb-2">Refund to wallet</h2>
                <p class="text-sm text-gray-600 mb-4">Your order was paid via OxaPay. Enter the wallet address for the refund. The order will be cancelled after OxaPay accepts the payout.</p>
                <label for="refundWalletInput" class="block text-sm font-medium text-gray-700 mb-1">Wallet address</label>
                <input type="text" id="refundWalletInput" class="form-input w-full" placeholder="TRC20 / EVM address" autocomplete="off">
                <p id="refundModalError" class="mt-3 text-sm text-red-600 hidden" role="alert"></p>
                <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                    <button type="button" id="refundModalBack" class="btn-secondary w-full justify-center min-h-[48px] order-2 sm:order-1">Back</button>
                    <button type="button" id="refundModalSubmit" class="btn-primary w-full justify-center min-h-[48px] text-sm px-4 py-3 order-1 sm:order-2" style="white-space: normal;">Confirm refund</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csrf = document.querySelector('meta[name="_csrf"]')?.content || '';
        let currentPage = 0;
        let currentStatus = 'active';
        const pageSize = 10;
        let pendingRefundOrderId = null;

        function paymentBadgeClass(ps) {
            if (!ps) return 'badge-warning';
            if (ps === 'PAID') return 'badge-success';
            if (ps === 'FAILED') return 'badge-danger';
            if (ps === 'REFUNDED') return 'badge-info';
            return 'badge-warning';
        }

        function closeRefundModal() {
            document.getElementById('refundModal').classList.add('hidden');
            pendingRefundOrderId = null;
            document.getElementById('refundWalletInput').value = '';
            var errEl = document.getElementById('refundModalError');
            errEl.classList.add('hidden');
            errEl.textContent = '';
        }

        function extractApiErrorMessage(text, status) {
            if (!text || !String(text).trim()) {
                return status ? ('Request failed (HTTP ' + status + ')') : 'Request failed';
            }
            var raw = String(text).trim();
            if (raw.startsWith('<!')) {
                return status ? ('Request failed (HTTP ' + status + ')') : 'Request failed';
            }
            try {
                var j = JSON.parse(raw);
                if (typeof j.message === 'string' && j.message.trim()) return j.message.trim();
                if (typeof j.detail === 'string' && j.detail.trim()) return j.detail.trim();
                if (typeof j.title === 'string' && j.title.trim() && j.title !== 'Bad Request') return j.title.trim();
                if (typeof j.error === 'string' && j.error.trim()) {
                    var code = j.error.trim();
                    if (code !== 'Bad Request' && code !== 'Internal Server Error') return code;
                }
            } catch (e) { /* not JSON */ }
            if (raw.length < 900) return raw;
            return status ? ('Request failed (HTTP ' + status + ')') : 'Request failed';
        }

        async function postCancelOrder(orderId, refundWalletAddress) {
            const headers = { 'Content-Type': 'application/json' };
            if (csrf) headers['X-CSRF-TOKEN'] = csrf;
            const body = refundWalletAddress
                ? JSON.stringify({ refundWalletAddress: refundWalletAddress })
                : '{}';
            const res = await fetch('/api/orders/' + encodeURIComponent(orderId) + '/cancel', {
                method: 'POST',
                headers: headers,
                body: body,
                credentials: 'same-origin'
            });
            const text = await res.text();
            if (!res.ok) {
                throw new Error(extractApiErrorMessage(text, res.status));
            }
            if (!text || !text.trim()) return {};
            try {
                return JSON.parse(text);
            } catch (e) {
                return {};
            }
        }

        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            const pagination = document.getElementById('pagination');
            try {
                const response = await fetch('/api/orders?page=' + currentPage + '&size=' + pageSize + '&status=' + encodeURIComponent(currentStatus));
                const data = await response.json();
                const orders = data.orders?.content || data.orders || [];
                const totalPages = data.totalPages || 1;

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-center py-12 text-gray-500">You have no orders yet</p>';
                    if (pagination) pagination.classList.add('hidden');
                    return;
                }

                container.innerHTML = '<table><thead><tr><th>Product</th><th>Quantity</th><th>Total</th><th>Order status</th><th>Payment</th><th>Date</th><th></th></tr></thead><tbody>' +
                    orders.map(order => {
                        const pay = order.paymentStatus || 'PENDING';
                        const showDeliveryBtn = order.status === 'SHIPPED';
                        const canCancel = ['PENDING', 'CONFIRMED', 'PROCESSING'].includes(order.status);
                        const needsRefundModal = order.paymentStatus === 'PAID' && order.paymentMethod === 'OXAPAY';
                        const actionCells = [];
                        if (showDeliveryBtn) {
                            actionCells.push('<button type="button" class="btn-primary text-sm px-3 py-1.5 confirm-delivery-btn" data-order-id="' + order.id + '">Order received</button>');
                        }
                        if (canCancel) {
                            actionCells.push('<button type="button" class="btn-secondary text-sm px-3 py-1.5 cancel-order-btn" data-order-id="' + order.id + '" data-needs-refund="' + (needsRefundModal ? '1' : '0') + '">Cancel order</button>');
                        }
                        const actionsHtml = actionCells.length ? actionCells.join(' ') : '';
                        return `
                        <tr class="hover:bg-gray-50">
                            <td class="cursor-pointer" onclick="window.location.href='/products/${order.productId}'">
                                <div class="flex items-center gap-3">
                                    <div class="w-14 h-14 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                                        ${order.productImage ? '<img src="' + order.productImage + '" alt="" class="w-full h-full object-cover" onerror="this.style.display=\'none\'">' : '<div class="w-full h-full flex items-center justify-center text-gray-400 text-xs">No photo</div>'}
                                    </div>
                                    <span class="font-medium text-gray-900 line-clamp-2">${order.productTitle || ''}</span>
                                </div>
                            </td>
                            <td>${order.quantity}</td>
                            <td class="font-bold text-primary">$${Number(order.totalPrice).toFixed(2)}</td>
                            <td><span class="badge ${order.status === 'DELIVERED' ? 'badge-success' : order.status === 'CANCELLED' ? 'badge-danger' : order.status === 'SHIPPED' ? 'badge-info' : order.status === 'CONFIRMED' ? 'badge-primary' : 'badge-warning'}">${order.status}</span></td>
                            <td><span class="badge ${paymentBadgeClass(order.paymentStatus)}">${pay}</span></td>
                            <td class="text-gray-500 text-sm">${new Date(order.createdAt).toLocaleDateString()}</td>
                            <td class="whitespace-nowrap"><div class="flex flex-wrap gap-2 justify-end">${actionsHtml}</div></td>
                        </tr>
                    `;
                    }).join('') + '</tbody></table>';

                container.querySelectorAll('.confirm-delivery-btn').forEach(function (btn) {
                    btn.addEventListener('click', async function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var oid = btn.getAttribute('data-order-id');
                        if (!oid) return;
                        btn.disabled = true;
                        var lab = btn.textContent;
                        btn.textContent = '…';
                        try {
                            var hdrs = { 'Content-Type': 'application/json' };
                            if (csrf) hdrs['X-CSRF-TOKEN'] = csrf;
                            var res = await fetch('/api/orders/' + encodeURIComponent(oid) + '/confirm-delivery', {
                                method: 'POST',
                                headers: hdrs
                            });
                            if (!res.ok) throw new Error(await res.text());
                            loadOrders();
                        } catch (err) {
                            console.error(err);
                            alert('Could not confirm delivery. ' + (err.message || ''));
                            btn.disabled = false;
                            btn.textContent = lab;
                        }
                    });
                });

                container.querySelectorAll('.cancel-order-btn').forEach(function (btn) {
                    btn.addEventListener('click', async function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var oid = btn.getAttribute('data-order-id');
                        var needsRefund = btn.getAttribute('data-needs-refund') === '1';
                        if (!oid) return;
                        if (needsRefund) {
                            pendingRefundOrderId = oid;
                            document.getElementById('refundWalletInput').value = '';
                            document.getElementById('refundModal').classList.remove('hidden');
                            document.getElementById('refundWalletInput').focus();
                            return;
                        }
                        if (!confirm('Cancel this order? Stock will be returned to the seller.')) return;
                        btn.disabled = true;
                        var lab = btn.textContent;
                        btn.textContent = '…';
                        try {
                            await postCancelOrder(oid, null);
                            loadOrders();
                        } catch (err) {
                            console.error(err);
                            alert('Could not cancel order. ' + (err.message || ''));
                            btn.disabled = false;
                            btn.textContent = lab;
                        }
                    });
                });

                document.getElementById('pageInfo').textContent = 'Page ' + (data.currentPage + 1) + ' of ' + totalPages;
                document.getElementById('prevPage').disabled = currentPage === 0;
                document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
                pagination.classList.remove('hidden');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="text-center py-12 text-red-500">Failed to load orders</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadOrders(); } });
            document.getElementById('nextPage').addEventListener('click', () => { currentPage++; loadOrders(); });
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentStatus = document.getElementById('statusFilter').value;
                currentPage = 0;
                loadOrders();
            });
            document.getElementById('refundModalBack').addEventListener('click', closeRefundModal);
            document.getElementById('refundModal').addEventListener('click', function (ev) {
                if (ev.target.id === 'refundModal') closeRefundModal();
            });
            document.getElementById('refundModalSubmit').addEventListener('click', async function () {
                if (!pendingRefundOrderId) return;
                var w = document.getElementById('refundWalletInput').value.trim();
                var errEl = document.getElementById('refundModalError');
                errEl.classList.add('hidden');
                errEl.textContent = '';
                if (!w) {
                    errEl.textContent = 'Please enter a wallet address.';
                    errEl.classList.remove('hidden');
                    return;
                }
                var submitBtn = document.getElementById('refundModalSubmit');
                submitBtn.disabled = true;
                var prev = submitBtn.textContent;
                submitBtn.textContent = '…';
                try {
                    await postCancelOrder(pendingRefundOrderId, w);
                    closeRefundModal();
                    loadOrders();
                } catch (err) {
                    console.error(err);
                    var msg = err && err.message ? err.message : 'Could not complete refund.';
                    errEl.textContent = msg;
                    errEl.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = prev;
                }
            });
        });
    </script>
</div>
</body>
</html>
