<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>Profile - Marketplace</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Profile</h1>

            <div class="max-w-xl">
                <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Personal details</h2>
                    <form id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="text" id="email" readonly class="form-input w-full bg-gray-100 cursor-not-allowed" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                            <input type="text" id="username" readonly class="form-input w-full bg-gray-100 cursor-not-allowed" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Your name" class="form-input w-full" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                            <input type="text" id="phoneNumber" name="phoneNumber" placeholder="+1 555 123 4567" class="form-input w-full" />
                        </div>
                        <div th:if="${currentUser != null and (currentUser.roles.contains(T(com.cryptodrop.persistence.user.UserRole).SELLER) or currentUser.roles.contains(T(com.cryptodrop.persistence.user.UserRole).ADMIN))}">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Wallet address for payouts</label>
                            <input type="text" id="walletAddress" name="walletAddress" placeholder="Tron T… (USDT TRC20) or 0x… (ERC20)" class="form-input w-full" />
                            <p class="text-xs text-gray-500 mt-1">Payout network is chosen automatically from the address (0x… → ERC20, Tron T… → TRC20)</p>
                            <p class="text-xs text-amber-700 mt-1">Warning: if the wallet address is incorrect, funds may be sent to the wrong address and cannot be recovered.</p>
                        </div>
                        <button type="submit" id="saveBtn" class="btn-primary px-6 py-2.5">
                            Save
                        </button>
                    </form>
                    <p id="profileMessage" class="mt-4 text-sm hidden"></p>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            window.currentUser = /*[[${currentUser}]]*/ null;
        </script>
        <script th:src="@{/js/profile.js}"></script>
    </div>
</body>
</html>
