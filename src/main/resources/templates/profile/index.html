<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>Профиль - Marketplace</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">Профиль</h1>

            <div class="max-w-xl">
                <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Личные данные</h2>
                    <form id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="text" id="email" readonly class="form-input w-full bg-gray-100 cursor-not-allowed" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
                            <input type="text" id="username" readonly class="form-input w-full bg-gray-100 cursor-not-allowed" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Имя или полное имя" class="form-input w-full" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Телефон</label>
                            <input type="text" id="phoneNumber" name="phoneNumber" placeholder="+7 (999) 123-45-67" class="form-input w-full" />
                        </div>
                        <div th:if="${currentUser != null and (currentUser.roles.contains(T(com.cryptodrop.persistence.user.UserRole).SELLER) or currentUser.roles.contains(T(com.cryptodrop.persistence.user.UserRole).ADMIN))}">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Адрес кошелька для перевода средств</label>
                            <input type="text" id="walletAddress" name="walletAddress" placeholder="0x... или другой адрес кошелька" class="form-input w-full" />
                        </div>
                        <button type="submit" id="saveBtn" class="btn-primary px-6 py-2.5">
                            Сохранить
                        </button>
                    </form>
                    <p id="profileMessage" class="mt-4 text-sm hidden"></p>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            window.currentUser = /*[[${currentUser}]]*/ null;
        </script>
        <script th:src="@{/js/profile.js}"></script>
    </div>
</body>
</html>
