<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/layout}">
<head>
    <title>Seller products - Marketplace</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-8">
            <div class="mb-6">
                <a th:href="@{/admin/featured}" class="text-primary hover:underline">← Back to sellers</a>
            </div>
            <h1 class="text-2xl font-bold mb-2 text-gray-900">Products of <span th:text="${seller.username}">Seller</span></h1>
            <p class="text-gray-600 mb-6">Toggle &quot;Feature&quot; to show the product on the homepage carousel.</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" th:if="${products != null and !products.isEmpty()}">
                <div th:each="product : ${products}" class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="block flex-1">
                        <div class="h-32 bg-gray-100 rounded-lg mb-3 overflow-hidden">
                            <img th:if="${product.images != null and !product.images.isEmpty()}" th:src="${product.images[0]}" alt="" class="w-full h-full object-cover">
                        </div>
                        <h3 class="font-medium text-sm line-clamp-2" th:text="${product.title}">Title</h3>
                        <p class="text-primary font-bold text-sm mt-1" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
                        <span th:if="${product.status == 'DRAFT'}" class="text-xs text-amber-600">Draft</span>
                    </a>
                    <div class="mt-3 pt-3 border-t">
                        <button type="button" th:if="${!product.isFeatured}"
                                class="admin-feature-btn w-full py-2 px-3 bg-primary text-white text-sm rounded-lg hover:bg-primary-dark"
                                th:attr="data-product-id=${product.id}">Feature on homepage</button>
                        <button type="button" th:if="${product.isFeatured}"
                                class="admin-unfeature-btn w-full py-2 px-3 border border-gray-300 text-sm rounded-lg hover:bg-gray-50"
                                th:attr="data-product-id=${product.id}">Remove from homepage</button>
                    </div>
                </div>
            </div>
            <div th:if="${products == null or products.isEmpty()}" class="text-center py-12 text-gray-500">No products.</div>
        </div>
        <script th:src="@{/js/admin-featured.js}"></script>
    </div>
</body>
</html>
