# Профиль prod — для Render и других хостингов
spring:
  flyway:
    enabled: true
    clean-disabled: true
    validate-on-migrate: true
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: native

logging:
  level:
    root: INFO
    com.cryptodrop: INFO
    org.springframework.security: WARN
