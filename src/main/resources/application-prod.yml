# Профиль prod — для Render и других хостингов
spring:
  flyway:
    enabled: true
    clean-disabled: true
    validate-on-migrate: true
  datasource:
    # Render (и многие облачные Postgres) требуют SSL — без sslmode=require часто EOF при auth
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: native

logging:
  level:
    root: INFO
    com.cryptodrop: INFO
    org.springframework.security: WARN

oxapay:
  enabled: ${OXAPAY_ENABLED:true}
  sandbox-enabled: ${OXAPAY_SANDBOX_ENABLED:false}
  sandbox-merchant: ${OXAPAY_SANDBOX_MERCHANT:sandbox}
  base-url: ${OXAPAY_BASE_URL:https://api.oxapay.com}
  merchant-api-key: ${OXAPAY_MERCHANT_API_KEY}
  payout-api-key: ${OXAPAY_PAYOUT_API_KEY:}
  callback-url: ${OXAPAY_CALLBACK_URL}
  return-url: ${OXAPAY_RETURN_URL}
  invoice-lifetime-minutes: ${OXAPAY_INVOICE_LIFETIME_MINUTES:30}
  currency: ${OXAPAY_CURRENCY:USD}
  payout-currency: ${OXAPAY_PAYOUT_CURRENCY:USDT}
  payout-network: ${OXAPAY_PAYOUT_NETWORK:TRC20}
