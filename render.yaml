# Render Blueprint — Java через Docker (runtime: java в Blueprint не поддерживается)
# Blueprint Path: render.yaml

databases:
  - name: marketplace-db
    databaseName: marketplace
    user: marketplace
    plan: free

services:
  - type: web
    name: marketplace-mvp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: marketplace-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: marketplace-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: marketplace-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: marketplace-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: marketplace-db
          property: password
